<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      background: #00c6ff;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 Welcome</h1>
    <p>Your website is live on AWS S3</p>
    <p>MADE BY LOVE :)</p>

    <button class="btn" onclick="showMessage()">
      Click Me
    </button>

    <footer>
      Built with ❤️ on AWS
    </footer>
  </div>

  <script>
    function showMessage() {
      alert("🔥 Your DevOps journey has started!");
    }
  </script>
</body>
</html>
